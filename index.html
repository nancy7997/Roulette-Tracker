<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>American Roulette Tracker | Interactive Payout & History</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: #1a3a2a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
      margin: 0;
      padding: 20px;
    }

    /* Main Roulette Container — felt texture */
    .roulette-app {
      max-width: 1400px;
      width: 100%;
      background: #1e4d2e;
      background-image: radial-gradient(circle at 25% 40%, rgba(0,0,0,0.08) 2%, transparent 2.5%),
                        radial-gradient(circle at 70% 85%, rgba(0,0,0,0.05) 1.8%, transparent 2%);
      background-size: 32px 32px, 28px 28px;
      border-radius: 48px;
      padding: 20px 24px 28px 24px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 4px rgba(255,255,200,0.2);
      border: 1px solid #c9a87b;
    }

    /* main two columns: LEFT (table) + RIGHT (history & payouts) */
    .dashboard {
      display: flex;
      flex-wrap: wrap;
      gap: 28px;
    }

    /* LEFT SIDE: roulette betting layout */
    .roulette-layout {
      flex: 3;
      min-width: 620px;
      background: rgba(0, 32, 16, 0.3);
      border-radius: 32px;
      padding: 12px 10px;
    }

    /* RIGHT PANEL: history + payouts + clear */
    .right-panel {
      flex: 1.2;
      min-width: 260px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(2px);
      border-radius: 32px;
      padding: 18px 14px;
      box-shadow: inset 0 0 8px rgba(0,0,0,0.3), 0 6px 12px rgba(0,0,0,0.2);
      border: 1px solid #e7cfa1;
    }

    /* ========== ROULETTE FELT GRID ========== */
    .top-zeros {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      justify-content: center;
    }

    .zero-cell, .double-zero-cell {
      background: #1d3b2a;
      border: 2px solid #eabc7e;
      border-radius: 28px;
      text-align: center;
      font-weight: bold;
      font-size: 1.7rem;
      color: #f9eec1;
      padding: 14px 0;
      width: 100px;
      cursor: pointer;
      transition: 0.1s linear;
      box-shadow: 0 3px 0 #6b4c2c;
      font-family: monospace;
      letter-spacing: 1px;
    }

    .number-grid-area {
      display: flex;
      gap: 12px;
      margin-bottom: 25px;
    }

    /* three columns of numbers */
    .numbers-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .number-cell {
      background: #2c221b;
      border-radius: 20px;
      text-align: center;
      padding: 12px 0;
      font-weight: bold;
      font-size: 1.25rem;
      border: 1px solid #cfb27c;
      color: #fef0cf;
      cursor: pointer;
      transition: 0.08s linear;
      box-shadow: 0 2px 5px rgba(0,0,0,0.4);
      font-family: monospace;
    }

    /* color styles for numbers */
    .number-cell.red-number {
      background: #9e2a2a;
      color: white;
      text-shadow: 0 1px 0 black;
    }
    .number-cell.black-number {
      background: #1e1e1e;
      color: #f5e7c8;
    }
    .number-cell.green-number {
      background: #2f6b47;
      color: gold;
    }

    /* column bets (2 to 1 areas) */
    .column-bets {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 90px;
      margin-left: 8px;
    }
    .col-bet {
      background: #1f3f2c;
      border: 2px solid #e0b071;
      border-radius: 28px;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.1rem;
      color: #f9e7b3;
      text-align: center;
      cursor: default;
      transition: 0.1s;
      min-height: 68px;
      font-family: 'Segoe UI';
    }

    /* dozens row */
    .dozens-row {
      display: flex;
      gap: 15px;
      margin: 25px 0 20px 0;
      justify-content: space-around;
    }
    .dozen-bet {
      background: #1f3f2c;
      border: 2px solid #e0b071;
      border-radius: 40px;
      padding: 12px 0;
      text-align: center;
      font-weight: bold;
      font-size: 1rem;
      flex: 1;
      color: #fbefc7;
      font-family: 'Segoe UI';
      cursor: default;
      transition: 0.1s;
    }

    /* outside bets (low/high, red/black, odd/even) */
    .outside-bets {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 15px;
      justify-content: center;
    }
    .out-bet {
      background: #1f3f2c;
      border: 2px solid #e0b071;
      border-radius: 40px;
      padding: 12px 18px;
      font-weight: bold;
      font-size: 1rem;
      min-width: 85px;
      text-align: center;
      color: #ffefc0;
      font-family: 'Segoe UI';
      cursor: default;
      transition: 0.1s;
    }

    /* Highlighting for active winning bets */
    .highlight-bet {
      background: radial-gradient(circle, #ffd966, #e6b422);
      border: 3px solid #fff3b0;
      color: #1e2a1a;
      box-shadow: 0 0 12px gold;
      transform: scale(0.98);
      font-weight: bold;
    }

    .highlight-number {
      background: #ffcf4a !important;
      color: #1f3a1a !important;
      border: 3px solid white !important;
      box-shadow: 0 0 18px #ffcc44;
      transform: scale(0.97);
      font-weight: 900;
    }

    /* Right panel components */
    .history-title {
      font-size: 1.6rem;
      font-weight: bold;
      color: #ffeaac;
      border-bottom: 2px solid #dbb45c;
      display: inline-block;
      margin-bottom: 15px;
    }
    .history-list {
      min-height: 280px;
      max-height: 360px;
      overflow-y: auto;
      background: #102618;
      border-radius: 28px;
      padding: 12px 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-content: flex-start;
      margin-bottom: 30px;
    }
    .history-chip {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.4rem;
      font-family: monospace;
      box-shadow: 0 2px 6px black;
      color: white;
      text-shadow: 0 1px 2px black;
    }
    .payouts-box {
      background: #0f2d1d;
      border-radius: 28px;
      padding: 14px;
      margin: 15px 0 20px;
    }
    .payouts-title {
      font-size: 1.2rem;
      font-weight: bold;
      color: #ffde9e;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }
    .winning-bets-list {
      color: #ffefcf;
      font-size: 0.9rem;
      line-height: 1.5;
      max-height: 200px;
      overflow-y: auto;
      padding-left: 10px;
    }
    .winning-bets-list span {
      display: block;
      padding: 5px 0;
      border-bottom: 1px dashed #5c794b;
    }
    .clear-btn {
      background: #ab8a54;
      border: none;
      width: 100%;
      padding: 12px;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 50px;
      color: #202010;
      cursor: pointer;
      transition: all 0.1s;
      margin-top: 10px;
      font-family: inherit;
      box-shadow: 0 3px 0 #4d3519;
    }
    .clear-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #4d3519;
    }

    /* scrollbar */
    .history-list::-webkit-scrollbar, .winning-bets-list::-webkit-scrollbar {
      width: 5px;
    }
    .history-list::-webkit-scrollbar-track {
      background: #254e30;
      border-radius: 10px;
    }
    .history-list::-webkit-scrollbar-thumb {
      background: #e0b071;
      border-radius: 10px;
    }

    @media (max-width: 880px) {
      .roulette-layout { min-width: 480px; }
      .number-cell { font-size: 1rem; padding: 8px 0; }
      .col-bet { font-size: 0.9rem; min-height: 55px;}
    }
  </style>
</head>
<body>
<div class="roulette-app">
  <div class="dashboard">
    <!-- ROULETTE TABLE LAYOUT -->
    <div class="roulette-layout">
      <!-- 0 & 00 row -->
      <div class="top-zeros">
        <div class="zero-cell" data-number="0">0</div>
        <div class="double-zero-cell" data-number="00">00</div>
      </div>

      <!-- numbers + column bets side by side -->
      <div class="number-grid-area">
        <div class="numbers-col" id="col1-container"></div>
        <div class="numbers-col" id="col2-container"></div>
        <div class="numbers-col" id="col3-container"></div>
        <div class="column-bets">
          <div class="col-bet" id="col1-bet">2 to 1<br>1st Col</div>
          <div class="col-bet" id="col2-bet">2 to 1<br>2nd Col</div>
          <div class="col-bet" id="col3-bet">2 to 1<br>3rd Col</div>
        </div>
      </div>

      <!-- Dozens Row -->
      <div class="dozens-row">
        <div class="dozen-bet" id="dozen1">1st 12<br>(1-12)</div>
        <div class="dozen-bet" id="dozen2">2nd 12<br>(13-24)</div>
        <div class="dozen-bet" id="dozen3">3rd 12<br>(25-36)</div>
      </div>

      <!-- Outside bets: low/high, red/black, odd/even -->
      <div class="outside-bets">
        <div class="out-bet" id="bet-low">1 to 18</div>
        <div class="out-bet" id="bet-even">EVEN</div>
        <div class="out-bet" id="bet-red">RED</div>
        <div class="out-bet" id="bet-black">BLACK</div>
        <div class="out-bet" id="bet-odd">ODD</div>
        <div class="out-bet" id="bet-high">19 to 36</div>
      </div>
    </div>

    <!-- RIGHT PANEL: HISTORY + PAYOUTS + CLEAR -->
    <div class="right-panel">
      <div class="history-title">🎲 PREVIOUS NUMBERS</div>
      <div class="history-list" id="historyList">
        <div style="color:#bdaa7a; width:100%; text-align:center;">—  waiting for spins  —</div>
      </div>

      <div class="payouts-box">
        <div class="payouts-title">💰 WINNING BETS & PAYOUTS</div>
        <div class="winning-bets-list" id="winningPayoutsList">
          <span>⚡ Click any number</span>
        </div>
      </div>
      <button class="clear-btn" id="clearHistoryBtn">🧹 CLEAR TABLE & HISTORY</button>
    </div>
  </div>
</div>

<script>
  // --------------------------------------------------------------
  //  AMERICAN ROULETTE MAPPINGS (0, 00, 1-36)
  // --------------------------------------------------------------
  const redNumbers = new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);
  const blackNumbers = new Set([2,4,6,8,10,11,13,15,17,20,22,24,26,28,29,31,33,35]);

  // Column mapping (1-based column index)
  function getColumn(num) {
    if (num === 0 || num === '00') return null;
    const n = Number(num);
    if (n % 3 === 1) return 1;      // 1,4,7...
    if (n % 3 === 2) return 2;      // 2,5,8...
    if (n % 3 === 0) return 3;      // 3,6,9...
    return null;
  }

  function getDozen(num) {
    if (num === 0 || num === '00') return null;
    const n = Number(num);
    if (n >= 1 && n <= 12) return 1;
    if (n >= 13 && n <= 24) return 2;
    if (n >= 25 && n <= 36) return 3;
    return null;
  }

  function getParity(num) {
    if (num === 0 || num === '00') return null;
    const n = Number(num);
    return n % 2 === 0 ? 'even' : 'odd';
  }

  function getHalf(num) {
    if (num === 0 || num === '00') return null;
    const n = Number(num);
    return n <= 18 ? 'low' : 'high';
  }

  function getColor(num) {
    if (num === 0 || num === '00') return 'green';
    const n = Number(num);
    if (redNumbers.has(n)) return 'red';
    if (blackNumbers.has(n)) return 'black';
    return 'green';
  }

  // --- DOM elements references ---
  const historyContainer = document.getElementById('historyList');
  const winningPayoutsDiv = document.getElementById('winningPayoutsList');
  const clearBtn = document.getElementById('clearHistoryBtn');

  // Bet region elements
  const col1Bet = document.getElementById('col1-bet');
  const col2Bet = document.getElementById('col2-bet');
  const col3Bet = document.getElementById('col3-bet');
  const dozen1 = document.getElementById('dozen1');
  const dozen2 = document.getElementById('dozen2');
  const dozen3 = document.getElementById('dozen3');
  const lowBet = document.getElementById('bet-low');
  const highBet = document.getElementById('bet-high');
  const evenBet = document.getElementById('bet-even');
  const oddBet = document.getElementById('bet-odd');
  const redBet = document.getElementById('bet-red');
  const blackBet = document.getElementById('bet-black');
  // inside numbers will be stored in a map for dynamic highlighting
  let numberElementsMap = new Map(); // key: string number ("0","00","1"...)

  // Data
  let historyNumbers = [];    // store raw values (strings: "0","00","1"...)
  let currentSelectedNumber = null;

  // Helper: remove all highlights from ALL bet regions + numbers
  function removeAllHighlights() {
    // remove active number highlight
    document.querySelectorAll('.number-cell, .zero-cell, .double-zero-cell').forEach(el => {
      el.classList.remove('highlight-number');
    });
    // remove bet highlights
    const allBetElements = [
      col1Bet, col2Bet, col3Bet,
      dozen1, dozen2, dozen3,
      lowBet, highBet, evenBet, oddBet, redBet, blackBet
    ];
    allBetElements.forEach(bet => {
      if (bet) bet.classList.remove('highlight-bet');
    });
  }

  // highlight specific winning bets based on selected number
  function highlightWinningBets(number) {
    if (number === null) return;
    const numValue = (number === '00') ? '00' : Number(number);
    
    // 1. Color
    const color = getColor(numValue);
    if (color === 'red') redBet.classList.add('highlight-bet');
    if (color === 'black') blackBet.classList.add('highlight-bet');
    // green (0/00) no red/black highlight
    
    // 2. Parity (even/odd) - only if not 0/00
    const parity = getParity(numValue);
    if (parity === 'even') evenBet.classList.add('highlight-bet');
    if (parity === 'odd') oddBet.classList.add('highlight-bet');
    
    // 3. Low / High
    const half = getHalf(numValue);
    if (half === 'low') lowBet.classList.add('highlight-bet');
    if (half === 'high') highBet.classList.add('highlight-bet');
    
    // 4. Dozen
    const dozenIdx = getDozen(numValue);
    if (dozenIdx === 1) dozen1.classList.add('highlight-bet');
    if (dozenIdx === 2) dozen2.classList.add('highlight-bet');
    if (dozenIdx === 3) dozen3.classList.add('highlight-bet');
    
    // 5. Column
    const colIdx = getColumn(numValue);
    if (colIdx === 1) col1Bet.classList.add('highlight-bet');
    if (colIdx === 2) col2Bet.classList.add('highlight-bet');
    if (colIdx === 3) col3Bet.classList.add('highlight-bet');
  }

  // Generate payout description text
  function generatePayoutText(number) {
    if (number === null) return ["⚡ No selection"];
    const numVal = (number === '00') ? '00' : Number(number);
    const payouts = [];
    
    // Straight up (selected number)
    payouts.push(`🎯 ${number} (Straight Up) — pays 35:1`);
    
    const color = getColor(numVal);
    if (color === 'red') payouts.push(`🔴 RED — pays 1:1`);
    if (color === 'black') payouts.push(`⚫ BLACK — pays 1:1`);
    if (color === 'green' && (numVal === 0 || numVal === '00')) payouts.push(`🟢 ${number} (Green) — pays 35:1 only`);
    
    const parity = getParity(numVal);
    if (parity === 'even') payouts.push(`♾️ EVEN — pays 1:1`);
    if (parity === 'odd') payouts.push(`🌀 ODD — pays 1:1`);
    
    const half = getHalf(numVal);
    if (half === 'low') payouts.push(`⬇️ 1 to 18 — pays 1:1`);
    if (half === 'high') payouts.push(`⬆️ 19 to 36 — pays 1:1`);
    
    const dozenIdx = getDozen(numVal);
    if (dozenIdx === 1) payouts.push(`📦 1st Dozen (1-12) — pays 2:1`);
    if (dozenIdx === 2) payouts.push(`📦 2nd Dozen (13-24) — pays 2:1`);
    if (dozenIdx === 3) payouts.push(`📦 3rd Dozen (25-36) — pays 2:1`);
    
    const colIdx = getColumn(numVal);
    if (colIdx === 1) payouts.push(`📌 Column 1 (2:1) — pays 2:1`);
    if (colIdx === 2) payouts.push(`📌 Column 2 (2:1) — pays 2:1`);
    if (colIdx === 3) payouts.push(`📌 Column 3 (2:1) — pays 2:1`);
    
    if (payouts.length === 1 && (numVal === 0 || numVal === '00')) {
      payouts.push(`🔮 No outside bets for ${number} — only Straight Up 35:1`);
    }
    return payouts;
  }

  // update right panel payouts display
  function updatePayoutsPanel(number) {
    const payoutList = generatePayoutText(number);
    winningPayoutsDiv.innerHTML = payoutList.map(text => `<span>✨ ${text}</span>`).join('');
    if (payoutList.length === 0) winningPayoutsDiv.innerHTML = '<span>🎲 Click a number to see wins</span>';
  }

  // add to history on the right side (number + color background)
  function addToHistory(number) {
    const numStr = String(number);
    let bgColor = '';
    const colorType = getColor(numStr);
    if (colorType === 'red') bgColor = '#c83a3a';
    else if (colorType === 'black') bgColor = '#2c2c2c';
    else bgColor = '#2f7852'; // green for 0/00
    
    const historyChip = document.createElement('div');
    historyChip.className = 'history-chip';
    historyChip.style.background = bgColor;
    historyChip.style.border = '1px solid #efcd82';
    historyChip.innerText = numStr;
    historyContainer.appendChild(historyChip);
    // scroll to bottom
    historyContainer.scrollTop = historyContainer.scrollHeight;
  }
  
  // rebuild full history list (after clear)
  function renderFullHistory() {
    historyContainer.innerHTML = '';
    if (historyNumbers.length === 0) {
      historyContainer.innerHTML = '<div style="color:#bdaa7a; width:100%; text-align:center;">—  waiting for spins  —</div>';
      return;
    }
    for (let num of historyNumbers) {
      let bgColor = '';
      const colType = getColor(num);
      if (colType === 'red') bgColor = '#c83a3a';
      else if (colType === 'black') bgColor = '#2c2c2c';
      else bgColor = '#2f7852';
      const chip = document.createElement('div');
      chip.className = 'history-chip';
      chip.style.background = bgColor;
      chip.style.border = '1px solid #efcd82';
      chip.innerText = num;
      historyContainer.appendChild(chip);
    }
    historyContainer.scrollTop = historyContainer.scrollHeight;
  }

  // Core: When number is selected (click)
  function onNumberSelected(number) {
    // add to history array
    historyNumbers.push(String(number));
    renderFullHistory();
    // store current selected
    currentSelectedNumber = number;
    // remove any existing highlights
    removeAllHighlights();
    // highlight the clicked number cell
    const numberCell = numberElementsMap.get(String(number));
    if (numberCell) numberCell.classList.add('highlight-number');
    // highlight all winning bets according to roulette rules
    highlightWinningBets(number);
    // update payouts panel on the right
    updatePayoutsPanel(number);
  }

  // clear everything: history, highlights, payouts reset
  function clearAll() {
    historyNumbers = [];
    renderFullHistory();
    removeAllHighlights();
    currentSelectedNumber = null;
    winningPayoutsDiv.innerHTML = '<span>🧹 Cleared — click any number</span>';
  }

  // ---------- Build dynamic number grid (1-36) with correct colors ----------
  function buildNumberGrid() {
    // columns: col1 (1,4,7,10,13,16,19,22,25,28,31,34)
    // col2 (2,5,8,11,14,17,20,23,26,29,32,35)
    // col3 (3,6,9,12,15,18,21,24,27,30,33,36)
    const col1Numbers = [1,4,7,10,13,16,19,22,25,28,31,34];
    const col2Numbers = [2,5,8,11,14,17,20,23,26,29,32,35];
    const col3Numbers = [3,6,9,12,15,18,21,24,27,30,33,36];
    
    const col1Container = document.getElementById('col1-container');
    const col2Container = document.getElementById('col2-container');
    const col3Container = document.getElementById('col3-container');
    
    function createNumberDiv(num) {
      const div = document.createElement('div');
      div.className = 'number-cell';
      const colorType = getColor(num);
      if (colorType === 'red') div.classList.add('red-number');
      else if (colorType === 'black') div.classList.add('black-number');
      else div.classList.add('green-number');
      div.innerText = num;
      div.setAttribute('data-number', num);
      div.addEventListener('click', (e) => {
        e.stopPropagation();
        onNumberSelected(num);
      });
      return div;
    }
    
    col1Numbers.forEach(num => {
      const cell = createNumberDiv(num);
      col1Container.appendChild(cell);
      numberElementsMap.set(String(num), cell);
    });
    col2Numbers.forEach(num => {
      const cell = createNumberDiv(num);
      col2Container.appendChild(cell);
      numberElementsMap.set(String(num), cell);
    });
    col3Numbers.forEach(num => {
      const cell = createNumberDiv(num);
      col3Container.appendChild(cell);
      numberElementsMap.set(String(num), cell);
    });
  }
  
  // Attach 0 and 00 events
  function attachZeroEvents() {
    const zeroCell = document.querySelector('.zero-cell');
    const doubleZeroCell = document.querySelector('.double-zero-cell');
    if (zeroCell) {
      zeroCell.addEventListener('click', () => onNumberSelected('0'));
      numberElementsMap.set('0', zeroCell);
    }
    if (doubleZeroCell) {
      doubleZeroCell.addEventListener('click', () => onNumberSelected('00'));
      numberElementsMap.set('00', doubleZeroCell);
    }
  }
  
  // init all bet region defaults (no highlight)
  // also make sure no accidental click triggers on bet areas (they are display only)
  function disableBetClicks() {
    const betAreas = [col1Bet, col2Bet, col3Bet, dozen1, dozen2, dozen3, lowBet, highBet, evenBet, oddBet, redBet, blackBet];
    betAreas.forEach(area => {
      if (area) area.style.cursor = 'default';
    });
  }

  // Initialize the whole application
  function init() {
    buildNumberGrid();
    attachZeroEvents();
    disableBetClicks();
    clearBtn.addEventListener('click', () => {
      clearAll();
    });
    // initial empty state
    removeAllHighlights();
    winningPayoutsDiv.innerHTML = '<span>🎲 Click on any number (0,00,1-36)</span>';
  }
  
  init();
</script>
</body>
</html>
