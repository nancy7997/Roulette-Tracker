<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>American Roulette Tracker – Classic Layout & Payouts</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: #0a2f1f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', 'Roboto', 'Inter', system-ui, sans-serif;
      padding: 24px 20px;
    }

    /* main landscape container: left table, right sidebar */
    .roulette-tracker {
      max-width: 1480px;
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 28px;
      background: transparent;
    }

    /* LEFT SIDE: authentic American Roulette felt table */
    .table-container {
      flex: 2.8;
      min-width: 680px;
      background: #1c5a3a;
      background-image: radial-gradient(circle at 15% 40%, rgba(0, 0, 0, 0.12) 2.2%, transparent 2.5%),
                        radial-gradient(circle at 85% 70%, rgba(0, 0, 0, 0.1) 1.8%, transparent 2.2%);
      background-size: 28px 28px, 32px 32px;
      border-radius: 42px;
      padding: 20px 18px 24px 18px;
      box-shadow: 0 18px 30px rgba(0, 0, 0, 0.5), inset 0 1px 3px rgba(255, 245, 180, 0.3);
      border: 1px solid #dbb46a;
    }

    .roulette-title {
      text-align: center;
      font-size: 1.3rem;
      font-weight: bold;
      letter-spacing: 2px;
      color: #f9e7b3;
      text-shadow: 2px 2px 0 #5a3e1f;
      margin-bottom: 18px;
      font-family: 'Segoe UI', monospace;
    }

    /* ========== CLASSIC AMERICAN TABLE GRID ========== */
    .american-layout {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* zeros row (0 and 00) on top left side of numbers */
    .zeros-row {
      display: flex;
      gap: 14px;
      margin-bottom: 10px;
    }

    .zero-cell, .double-zero-cell {
      background: #2a452f;
      border: 2px solid #ecc88b;
      border-radius: 32px;
      text-align: center;
      font-size: 1.7rem;
      font-weight: 800;
      font-family: monospace;
      padding: 14px 0;
      width: 95px;
      color: #fff3cf;
      cursor: pointer;
      transition: 0.08s linear;
      box-shadow: 0 4px 0 #6b4c2c;
      letter-spacing: 1px;
    }

    /* main number block: 3 columns + column bets on the right */
    .numbers-panel {
      display: flex;
      gap: 14px;
      width: 100%;
    }

    .numbers-grid {
      flex: 5;
      display: flex;
      gap: 12px;
    }

    .num-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .number-card {
      background: #282011;
      border-radius: 24px;
      text-align: center;
      padding: 14px 0;
      font-size: 1.35rem;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      border: 1px solid #e6be7a;
      cursor: pointer;
      transition: 0.07s linear;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      color: #fef0cf;
    }

    /* Red / Black colors */
    .number-card.red-number {
      background: #b12a2a;
      background: linear-gradient(145deg, #c23636, #9e1e1e);
      color: white;
      text-shadow: 0 1px 1px black;
    }
    .number-card.black-number {
      background: #1a1a1a;
      background: linear-gradient(145deg, #2a2a2a, #111);
      color: #f5e2b2;
    }
    .number-card.green-number {
      background: #1e6b47;
      background: linear-gradient(145deg, #30855a, #1d5538);
      color: #ffefb9;
    }

    /* column bets (2 to 1 boxes) */
    .column-bets-vertical {
      flex: 0.9;
      display: flex;
      flex-direction: column;
      gap: 8px;
      justify-content: space-between;
    }

    .col-bet-box {
      background: #1f412d;
      border: 2px solid #e2b878;
      border-radius: 32px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1rem;
      text-align: center;
      color: #ffefc7;
      min-height: 68px;
      font-family: 'Segoe UI';
      padding: 8px 5px;
      backdrop-filter: blur(1px);
      transition: 0.1s;
    }

    /* Dozens row */
    .dozens-row {
      display: flex;
      gap: 14px;
      margin: 20px 0 16px 0;
    }
    .dozen-item {
      background: #1f412d;
      border: 2px solid #e2b878;
      border-radius: 44px;
      flex: 1;
      text-align: center;
      padding: 12px 0;
      font-weight: bold;
      font-size: 1rem;
      color: #fff3cf;
      font-family: 'Segoe UI';
      transition: 0.1s;
    }

    /* Outside bets row */
    .outside-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      margin-top: 12px;
    }
    .outside-bet {
      background: #1f412d;
      border: 2px solid #e2b878;
      border-radius: 44px;
      flex: 1;
      text-align: center;
      padding: 12px 6px;
      font-weight: bold;
      font-size: 1rem;
      min-width: 82px;
      color: #ffefc7;
      transition: 0.1s;
      font-family: 'Segoe UI';
    }

    /* highlight classes for winning bets & numbers */
    .highlight-number-bet {
      background: radial-gradient(circle, #ffd966, #f5b81b) !important;
      border: 3px solid #fff7cf !important;
      color: #1e3a1a !important;
      box-shadow: 0 0 14px #ffcc44;
      transform: scale(0.97);
      font-weight: 900;
    }
    .highlight-bet-area {
      background: radial-gradient(ellipse at center, #f3cd81, #e6a72a) !important;
      border: 3px solid #ffe6a3 !important;
      color: #1e2a0e !important;
      font-weight: bold;
      box-shadow: 0 0 14px #f0b843;
      transform: scale(0.98);
    }

    /* RIGHT PANEL: History + payouts + clear */
    .right-panel {
      flex: 1.2;
      min-width: 280px;
      background: #0f2e1ecc;
      backdrop-filter: blur(6px);
      border-radius: 40px;
      padding: 22px 18px;
      border: 1px solid #e6c384;
      box-shadow: 0 12px 24px rgba(0,0,0,0.3);
    }

    .history-header {
      font-size: 1.7rem;
      font-weight: bold;
      color: #ffefb0;
      border-left: 6px solid #eeb55b;
      padding-left: 14px;
      margin-bottom: 20px;
    }

    .history-strip {
      background: #102618;
      border-radius: 36px;
      min-height: 280px;
      max-height: 340px;
      overflow-y: auto;
      padding: 18px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 28px;
    }

    .history-chip {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.4rem;
      font-family: monospace;
      box-shadow: 0 3px 8px black;
      color: white;
      text-shadow: 0 1px 1px black;
      border: 1px solid #ffdf9c;
    }

    .payout-card {
      background: #072011;
      border-radius: 32px;
      padding: 16px 14px;
      margin: 18px 0 20px;
    }
    .payout-header {
      font-size: 1.2rem;
      font-weight: bold;
      color: #f7de9c;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }
    .win-list {
      color: #fef0cf;
      font-size: 0.9rem;
      max-height: 200px;
      overflow-y: auto;
      padding-right: 6px;
    }
    .win-list span {
      display: block;
      padding: 7px 0;
      border-bottom: 1px dashed #5e855e;
      font-family: monospace;
    }
    .clear-all-btn {
      background: #c69c5e;
      border: none;
      width: 100%;
      padding: 14px;
      border-radius: 60px;
      font-size: 1.2rem;
      font-weight: bold;
      color: #202010;
      cursor: pointer;
      transition: 0.08s linear;
      box-shadow: 0 4px 0 #6c4b27;
      margin-top: 12px;
    }
    .clear-all-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #6c4b27;
    }
    .empty-history-msg {
      width: 100%;
      text-align: center;
      color: #bdad7a;
      font-style: italic;
    }

    @media (max-width: 980px) {
      .table-container { min-width: 560px; }
      .number-card { padding: 9px 0; font-size: 1rem; }
      .zero-cell, .double-zero-cell { width: 75px; font-size: 1.4rem; }
    }
  </style>
</head>
<body>
<div class="roulette-tracker">
  <!-- LEFT SIDE: CLASSIC AMERICAN TABLE LAYOUT (exactly as standard layout) -->
  <div class="table-container">
    <div class="roulette-title">🇺🇸 AMERICAN ROULETTE · DOUBLE ZERO</div>
    <div class="american-layout">
      <!-- Zeros row: 0 and 00 exactly on top left above numbers -->
      <div class="zeros-row">
        <div class="zero-cell" data-num="0">0</div>
        <div class="double-zero-cell" data-num="00">00</div>
      </div>

      <!-- main numbers + column bets -->
      <div class="numbers-panel">
        <div class="numbers-grid" id="numbersGrid">
          <!-- Three columns will be injected by JS with proper red/black mapping -->
        </div>
        <div class="column-bets-vertical">
          <div class="col-bet-box" id="col1Bet">2️⃣ TO 1<br>1st Col</div>
          <div class="col-bet-box" id="col2Bet">2️⃣ TO 1<br>2nd Col</div>
          <div class="col-bet-box" id="col3Bet">2️⃣ TO 1<br>3rd Col</div>
        </div>
      </div>

      <!-- Dozens row -->
      <div class="dozens-row">
        <div class="dozen-item" id="dozen1Bet">1st 12<br>(1-12)</div>
        <div class="dozen-item" id="dozen2Bet">2nd 12<br>(13-24)</div>
        <div class="dozen-item" id="dozen3Bet">3rd 12<br>(25-36)</div>
      </div>

      <!-- Outside bets: exactly from reference image -->
      <div class="outside-row">
        <div class="outside-bet" id="lowBet">1 to 18</div>
        <div class="outside-bet" id="evenBet">EVEN</div>
        <div class="outside-bet" id="redBet">RED</div>
        <div class="outside-bet" id="blackBet">BLACK</div>
        <div class="outside-bet" id="oddBet">ODD</div>
        <div class="outside-bet" id="highBet">19 to 36</div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL: HISTORY + WINNING PAYOUTS + CLEAR BUTTON -->
  <div class="right-panel">
    <div class="history-header">📜 PREVIOUS SPINS</div>
    <div class="history-strip" id="historyList">
      <div class="empty-history-msg">— click any number —</div>
    </div>
    <div class="payout-card">
      <div class="payout-header">💎 WINNING BETS & PAYOUTS</div>
      <div class="win-list" id="payoutList">
        <span>✨ select a number</span>
      </div>
    </div>
    <button class="clear-all-btn" id="clearAllBtn">🧹 CLEAR HISTORY & TABLE</button>
  </div>
</div>

<script>
  // ======================= AMERICAN ROULETTE DATA ========================
  const redSet = new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);
  const blackSet = new Set([2,4,6,8,10,11,13,15,17,20,22,24,26,28,29,31,33,35]);
  
  // Column definition (1-based)
  function getColumnNumber(num) {
    if (num === 0 || num === '00') return null;
    const n = Number(num);
    if (n % 3 === 1) return 1;
    if (n % 3 === 2) return 2;
    return 3; // remainder 0
  }
  
  function getDozen(num) {
    if (num === 0 || num === '00') return null;
    const n = Number(num);
    if (n >= 1 && n <= 12) return 1;
    if (n >= 13 && n <= 24) return 2;
    if (n >= 25 && n <= 36) return 3;
    return null;
  }
  
  function getParity(num) {
    if (num === 0 || num === '00') return null;
    const n = Number(num);
    return n % 2 === 0 ? 'even' : 'odd';
  }
  
  function getHalf(num) {
    if (num === 0 || num === '00') return null;
    const n = Number(num);
    return n <= 18 ? 'low' : 'high';
  }
  
  function getColorType(num) {
    if (num === 0 || num === '00') return 'green';
    const n = Number(num);
    if (redSet.has(n)) return 'red';
    if (blackSet.has(n)) return 'black';
    return 'green';
  }
  
  // ---------- DOM references ----------
  const numbersGrid = document.getElementById('numbersGrid');
  const historyContainer = document.getElementById('historyList');
  const payoutListDiv = document.getElementById('payoutList');
  const clearBtn = document.getElementById('clearAllBtn');
  
  // Betting areas
  const col1Elem = document.getElementById('col1Bet');
  const col2Elem = document.getElementById('col2Bet');
  const col3Elem = document.getElementById('col3Bet');
  const dozen1Elem = document.getElementById('dozen1Bet');
  const dozen2Elem = document.getElementById('dozen2Bet');
  const dozen3Elem = document.getElementById('dozen3Bet');
  const lowElem = document.getElementById('lowBet');
  const highElem = document.getElementById('highBet');
  const evenElem = document.getElementById('evenBet');
  const oddElem = document.getElementById('oddBet');
  const redElem = document.getElementById('redBet');
  const blackElem = document.getElementById('blackBet');
  
  // Store number cell elements
  const numberCellsMap = new Map(); // key: string "0","00","1"... , value: DOM element
  
  // History array
  let spinHistory = [];   // stores string values "0","00","1".."36"
  
  // Helper: remove all highlights from numbers and betting zones
  function removeAllHighlights() {
    // remove number highlights
    document.querySelectorAll('.number-card, .zero-cell, .double-zero-cell').forEach(el => {
      el.classList.remove('highlight-number-bet');
    });
    const allBetZones = [col1Elem, col2Elem, col3Elem, dozen1Elem, dozen2Elem, dozen3Elem,
                         lowElem, highElem, evenElem, oddElem, redElem, blackElem];
    allBetZones.forEach(zone => {
      if (zone) zone.classList.remove('highlight-bet-area');
    });
  }
  
  // Highlight winning bets based on selected number
  function highlightWinningBetZones(number) {
    if (number === null) return;
    const numVal = (number === '00') ? '00' : Number(number);
    
    // color bets (only for regular numbers)
    const color = getColorType(numVal);
    if (color === 'red') redElem.classList.add('highlight-bet-area');
    if (color === 'black') blackElem.classList.add('highlight-bet-area');
    // no red/black for 0/00
    
    // parity
    const parity = getParity(numVal);
    if (parity === 'even') evenElem.classList.add('highlight-bet-area');
    if (parity === 'odd') oddElem.classList.add('highlight-bet-area');
    
    // low/high
    const half = getHalf(numVal);
    if (half === 'low') lowElem.classList.add('highlight-bet-area');
    if (half === 'high') highElem.classList.add('highlight-bet-area');
    
    // dozen
    const dozenIdx = getDozen(numVal);
    if (dozenIdx === 1) dozen1Elem.classList.add('highlight-bet-area');
    if (dozenIdx === 2) dozen2Elem.classList.add('highlight-bet-area');
    if (dozenIdx === 3) dozen3Elem.classList.add('highlight-bet-area');
    
    // column
    const colIdx = getColumnNumber(numVal);
    if (colIdx === 1) col1Elem.classList.add('highlight-bet-area');
    if (colIdx === 2) col2Elem.classList.add('highlight-bet-area');
    if (colIdx === 3) col3Elem.classList.add('highlight-bet-area');
  }
  
  // Generate payout description and odds
  function getPayoutTextForNumber(number) {
    if (number === null) return ["❌ no active number"];
    const numVal = (number === '00') ? '00' : Number(number);
    const payouts = [];
    
    // Straight up always 35:1
    payouts.push(`🎯 STRAIGHT UP ${number} — 35:1`);
    
    // Additional bets only for 1-36
    if (numVal !== 0 && numVal !== '00') {
      const color = getColorType(numVal);
      if (color === 'red') payouts.push(`🔴 RED — 1:1`);
      if (color === 'black') payouts.push(`⚫ BLACK — 1:1`);
      
      const parity = getParity(numVal);
      if (parity === 'even') payouts.push(`🟢 EVEN — 1:1`);
      if (parity === 'odd') payouts.push(`🔵 ODD — 1:1`);
      
      const half = getHalf(numVal);
      if (half === 'low') payouts.push(`⬇️ 1 TO 18 — 1:1`);
      if (half === 'high') payouts.push(`⬆️ 19 TO 36 — 1:1`);
      
      const dozenIdx = getDozen(numVal);
      if (dozenIdx === 1) payouts.push(`📦 1st DOZEN (1-12) — 2:1`);
      if (dozenIdx === 2) payouts.push(`📦 2nd DOZEN (13-24) — 2:1`);
      if (dozenIdx === 3) payouts.push(`📦 3rd DOZEN (25-36) — 2:1`);
      
      const colIdx = getColumnNumber(numVal);
      if (colIdx === 1) payouts.push(`📌 COLUMN 1 (2:1) — 2:1`);
      if (colIdx === 2) payouts.push(`📌 COLUMN 2 (2:1) — 2:1`);
      if (colIdx === 3) payouts.push(`📌 COLUMN 3 (2:1) — 2:1`);
    } else {
      payouts.push(`🟢 ${number} (Green) — only Straight Up 35:1`);
    }
    return payouts;
  }
  
  // Update right panel payouts
  function updatePayoutsPanel(number) {
    const payoutItems = getPayoutTextForNumber(number);
    payoutListDiv.innerHTML = payoutItems.map(item => `<span>💰 ${item}</span>`).join('');
    if (payoutItems.length === 0) payoutListDiv.innerHTML = '<span>⚡ Click any number</span>';
  }
  
  // Add new number to history (visual)
  function renderHistory() {
    historyContainer.innerHTML = '';
    if (spinHistory.length === 0) {
      historyContainer.innerHTML = '<div class="empty-history-msg">🎲 no spins yet</div>';
      return;
    }
    spinHistory.forEach(num => {
      const bgColor = (() => {
        const col = getColorType(num);
        if (col === 'red') return '#c63636';
        if (col === 'black') return '#2a2a2a';
        return '#2f7852';
      })();
      const chip = document.createElement('div');
      chip.className = 'history-chip';
      chip.style.background = bgColor;
      chip.style.background = `linear-gradient(145deg, ${bgColor}, ${bgColor}dd)`;
      chip.innerText = num;
      historyContainer.appendChild(chip);
    });
    historyContainer.scrollTop = historyContainer.scrollHeight;
  }
  
  // ---------- MAIN INTERACTION: click on number ----------
  function onNumberSelected(numberValue) {
    // add to history (every click = new spin)
    spinHistory.push(String(numberValue));
    renderHistory();
    
    // remove all current highlights
    removeAllHighlights();
    
    // highlight the clicked number cell
    const targetCell = numberCellsMap.get(String(numberValue));
    if (targetCell) targetCell.classList.add('highlight-number-bet');
    
    // highlight all winning bet zones (dozen, column, outside, colors)
    highlightWinningBetZones(numberValue);
    
    // update payouts panel with correct odds
    updatePayoutsPanel(numberValue);
  }
  
  // Clear everything: history, highlights, reset payouts
  function clearAllData() {
    spinHistory = [];
    renderHistory();
    removeAllHighlights();
    updatePayoutsPanel(null);
    payoutListDiv.innerHTML = '<span>🧹 Cleared — pick a number</span>';
  }
  
  // ========== BUILD AMERICAN TABLE NUMBERS (1-36) with exact columns ==========
  function buildNumberGrid() {
    // classic 3 columns layout
    const col1Numbers = [1,4,7,10,13,16,19,22,25,28,31,34];
    const col2Numbers = [2,5,8,11,14,17,20,23,26,29,32,35];
    const col3Numbers = [3,6,9,12,15,18,21,24,27,30,33,36];
    
    // create 3 separate div containers
    const col1Div = document.createElement('div');
    const col2Div = document.createElement('div');
    const col3Div = document.createElement('div');
    col1Div.className = 'num-col';
    col2Div.className = 'num-col';
    col3Div.className = 'num-col';
    
    function createNumberElement(num) {
      const div = document.createElement('div');
      div.className = 'number-card';
      const colorType = getColorType(num);
      if (colorType === 'red') div.classList.add('red-number');
      else if (colorType === 'black') div.classList.add('black-number');
      else div.classList.add('green-number');
      div.innerText = num;
      div.setAttribute('data-num', num);
      div.addEventListener('click', (e) => {
        e.stopPropagation();
        onNumberSelected(num);
      });
      return div;
    }
    
    col1Numbers.forEach(n => {
      const el = createNumberElement(n);
      col1Div.appendChild(el);
      numberCellsMap.set(String(n), el);
    });
    col2Numbers.forEach(n => {
      const el = createNumberElement(n);
      col2Div.appendChild(el);
      numberCellsMap.set(String(n), el);
    });
    col3Numbers.forEach(n => {
      const el = createNumberElement(n);
      col3Div.appendChild(el);
      numberCellsMap.set(String(n), el);
    });
    
    numbersGrid.appendChild(col1Div);
    numbersGrid.appendChild(col2Div);
    numbersGrid.appendChild(col3Div);
  }
  
  // attach zero & double zero listeners
  function attachZeroListeners() {
    const zeroCell = document.querySelector('.zero-cell');
    const doubleZeroCell = document.querySelector('.double-zero-cell');
    if (zeroCell) {
      zeroCell.addEventListener('click', () => onNumberSelected('0'));
      numberCellsMap.set('0', zeroCell);
    }
    if (doubleZeroCell) {
      doubleZeroCell.addEventListener('click', () => onNumberSelected('00'));
      numberCellsMap.set('00', doubleZeroCell);
    }
  }
  
  // helper to disable interactive look on bet zones (no direct click, but visual only)
  function setBetZonesInert() {
    const betZones = [col1Elem, col2Elem, col3Elem, dozen1Elem, dozen2Elem, dozen3Elem,
      lowElem, highElem, evenElem, oddElem, redElem, blackElem];
    betZones.forEach(zone => {
      if (zone) zone.style.cursor = 'default';
    });
  }
  
  // initial render and event handlers
  function init() {
    buildNumberGrid();
    attachZeroListeners();
    setBetZonesInert();
    clearBtn.addEventListener('click', () => {
      clearAllData();
    });
    // default payout placeholder
    updatePayoutsPanel(null);
    renderHistory();
  }
  
  init();
</script>
</body>
</html>
