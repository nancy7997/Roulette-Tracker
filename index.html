<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>American Roulette Tracker | Landscape Table + 3‑Row History</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: #0a3a22;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', 'Roboto', 'Inter', system-ui, sans-serif;
      padding: 20px;
    }

    /* MAIN WRAPPER – LANDSCAPE ORIENTATION */
    .roulette-app {
      max-width: 1480px;
      width: 100%;
      background: #145a36;
      border-radius: 52px;
      padding: 20px 24px 32px 24px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 4px rgba(255,250,180,0.2);
      border: 1px solid #e6c17a;
    }

    /* === 3-ROW HISTORY (TOP) === */
    .history-area {
      background: #082a18cc;
      backdrop-filter: blur(3px);
      border-radius: 44px;
      padding: 16px 24px;
      margin-bottom: 32px;
      border: 1px solid #f0cf8a;
    }
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .history-header h2 {
      font-size: 1.5rem;
      font-weight: bold;
      color: #fff2c4;
      letter-spacing: 1px;
      text-shadow: 1px 1px 0 #4f3a1a;
    }
    .clear-all-btn {
      background: #c69755;
      border: none;
      padding: 8px 28px;
      border-radius: 60px;
      font-weight: bold;
      font-size: 1rem;
      color: #1c2a0e;
      cursor: pointer;
      transition: 0.08s linear;
      box-shadow: 0 3px 0 #745a32;
      font-family: inherit;
    }
    .clear-all-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #745a32;
    }

    .history-rows {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .history-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      min-height: 70px;
      background: #07201355;
      border-radius: 60px;
      padding: 8px 16px;
    }
    .history-chip {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.45rem;
      font-family: 'Courier New', monospace;
      box-shadow: 0 3px 8px rgba(0,0,0,0.5);
      color: white;
      text-shadow: 0 1px 2px black;
      border: 1px solid #ffdf9c;
    }
    .empty-row-msg {
      color: #cbbd88;
      font-style: italic;
      font-size: 0.9rem;
      padding: 8px;
    }

    /* === LANDSCAPE ROULETTE TABLE – WIDE HORIZONTAL === */
    .roulette-table {
      background: #175f3a;
      background-image: radial-gradient(circle at 15% 30%, rgba(0,0,0,0.12) 2%, transparent 2.5%);
      background-size: 28px 28px;
      border-radius: 48px;
      padding: 22px 20px 28px 20px;
      margin-bottom: 32px;
      border: 2px solid #eac27d;
      box-shadow: inset 0 0 0 1px #fbe2aa, 0 12px 22px rgba(0,0,0,0.3);
      width: 100%;
      overflow-x: auto;
    }

    /* LANDSCAPE FLEX STRUCTURE – horizontal flow */
    .landscape-grid {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 20px;
      align-items: flex-start;
      min-width: 880px;
    }

    /* Zeros column on the far left (0 and 00 stacked) */
    .zeros-stack {
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: 105px;
    }
    .zero-item, .doublezero-item {
      background: #2b5339;
      border: 2px solid #efcb8a;
      border-radius: 38px;
      text-align: center;
      font-size: 1.9rem;
      font-weight: 800;
      font-family: monospace;
      padding: 18px 0;
      width: 100%;
      color: #fff6dd;
      cursor: pointer;
      transition: 0.08s;
      box-shadow: 0 4px 0 #5b411f;
    }

    /* Three number columns (1-36) */
    .numbers-threecols {
      display: flex;
      gap: 16px;
      flex: 4;
    }
    .num-col-land {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    .number-cell-land {
      background: #272011;
      border-radius: 28px;
      text-align: center;
      padding: 14px 0;
      font-size: 1.3rem;
      font-weight: bold;
      font-family: monospace;
      border: 1px solid #eac27d;
      cursor: pointer;
      transition: 0.05s linear;
      box-shadow: 0 2px 5px rgba(0,0,0,0.4);
      color: #ffeecd;
    }
    .red-num {
      background: #b03232;
      background: linear-gradient(145deg, #c53a3a, #9f2323);
      color: white;
    }
    .black-num {
      background: #1f1f1f;
      background: linear-gradient(145deg, #2c2c2c, #131313);
      color: #ffe2b5;
    }
    .green-num {
      background: #23855c;
      background: linear-gradient(145deg, #2f9e6e, #1a6746);
      color: #ffefc0;
    }

    /* Column bets (2 to 1) – vertical to the right */
    .column-bets-land {
      display: flex;
      flex-direction: column;
      gap: 9px;
      width: 95px;
    }
    .col-bet-land {
      background: #1e4d33;
      border: 2px solid #eac27d;
      border-radius: 38px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 0.95rem;
      text-align: center;
      color: #fff6df;
      padding: 8px 5px;
      transition: 0.1s;
      min-height: 75px;
    }

    /* Dozens row (full width under the numbers) */
    .dozens-land {
      display: flex;
      gap: 18px;
      margin-top: 24px;
      margin-bottom: 20px;
      width: 100%;
    }
    .dozen-land {
      background: #1e4d33;
      border: 2px solid #eac27d;
      border-radius: 50px;
      flex: 1;
      text-align: center;
      padding: 12px 0;
      font-weight: bold;
      font-size: 1rem;
      color: #fff6df;
      transition: 0.1s;
    }

    /* Outside bets row – all 6 options */
    .outside-land {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      width: 100%;
    }
    .outside-land-item {
      background: #1e4d33;
      border: 2px solid #eac27d;
      border-radius: 50px;
      flex: 1;
      text-align: center;
      padding: 12px 8px;
      font-weight: bold;
      font-size: 0.95rem;
      min-width: 85px;
      color: #fff6df;
      transition: 0.1s;
    }

    /* Highlight styles */
    .highlight-number-active {
      background: radial-gradient(circle, #ffda7c, #f0b735) !important;
      border: 3px solid #fff3bf !important;
      color: #1f3b10 !important;
      transform: scale(0.97);
      box-shadow: 0 0 18px #ffc857;
      font-weight: 900;
    }
    .highlight-bet-active {
      background: radial-gradient(ellipse at center, #ffcd6b, #eda92b) !important;
      border: 3px solid #fff0b5 !important;
      color: #1e2f0a !important;
      font-weight: bold;
      transform: scale(0.98);
      box-shadow: 0 0 14px #f5bc44;
    }

    /* === PAYOUTS SECTION (UNDERNEATH TABLE) === */
    .payouts-section {
      background: #082a18e0;
      backdrop-filter: blur(4px);
      border-radius: 48px;
      padding: 20px 26px;
      border: 1px solid #efcd8e;
      margin-top: 6px;
    }
    .payout-title {
      font-size: 1.5rem;
      font-weight: bold;
      color: #ffeac2;
      border-left: 6px solid #ffc05e;
      padding-left: 18px;
      margin-bottom: 18px;
    }
    .payout-container {
      background: #0f2b1c;
      border-radius: 44px;
      padding: 18px 24px;
      min-height: 150px;
      max-height: 210px;
      overflow-y: auto;
    }
    .payout-item {
      display: block;
      font-family: monospace;
      font-size: 1rem;
      padding: 8px 0;
      border-bottom: 1px solid #54855c;
      color: #fff2cf;
    }
    .empty-payout {
      color: #bbaa77;
      text-align: center;
      font-style: italic;
    }

    /* Responsive: keep landscape scroll */
    @media (max-width: 1000px) {
      .roulette-app { padding: 16px; }
      .number-cell-land { font-size: 1rem; padding: 10px 0; }
      .zero-item, .doublezero-item { font-size: 1.5rem; padding: 12px 0; }
      .history-chip { width: 54px; height: 54px; font-size: 1.2rem; }
    }
  </style>
</head>
<body>
<div class="roulette-app">
  <!-- === TOP: 3 ROWS PREVIOUS WINS === -->
  <div class="history-area">
    <div class="history-header">
      <h2>🎲 PREVIOUS WINS — 3 ROWS</h2>
      <button class="clear-all-btn" id="clearAllBtn">🗑️ CLEAR ALL</button>
    </div>
    <div class="history-rows" id="historyRowsContainer">
      <div class="history-row" id="row1"></div>
      <div class="history-row" id="row2"></div>
      <div class="history-row" id="row3"></div>
    </div>
  </div>

  <!-- === LANDSCAPE AMERICAN ROULETTE TABLE (EXACT LAYOUT) === -->
  <div class="roulette-table">
    <div class="landscape-grid">
      <!-- Zeros column (0 and 00 stacked left) -->
      <div class="zeros-stack">
        <div class="zero-item" data-num="0">0</div>
        <div class="doublezero-item" data-num="00">00</div>
      </div>

      <!-- 3 Columns of numbers (1-36) -->
      <div class="numbers-threecols" id="numbersGridLand"></div>

      <!-- Column bets (2:1) right side -->
      <div class="column-bets-land">
        <div class="col-bet-land" id="col1BetLand">2️⃣ to 1<br>1st Col</div>
        <div class="col-bet-land" id="col2BetLand">2️⃣ to 1<br>2nd Col</div>
        <div class="col-bet-land" id="col3BetLand">2️⃣ to 1<br>3rd Col</div>
      </div>
    </div>

    <!-- Dozens row (full width) -->
    <div class="dozens-land">
      <div class="dozen-land" id="dozen1Land">1st 12<br>(1-12)</div>
      <div class="dozen-land" id="dozen2Land">2nd 12<br>(13-24)</div>
      <div class="dozen-land" id="dozen3Land">3rd 12<br>(25-36)</div>
    </div>

    <!-- Outside bets: 1-18, EVEN, RED, BLACK, ODD, 19-36 -->
    <div class="outside-land">
      <div class="outside-land-item" id="lowBetLand">1 to 18</div>
      <div class="outside-land-item" id="evenBetLand">EVEN</div>
      <div class="outside-land-item" id="redBetLand">RED</div>
      <div class="outside-land-item" id="blackBetLand">BLACK</div>
      <div class="outside-land-item" id="oddBetLand">ODD</div>
      <div class="outside-land-item" id="highBetLand">19 to 36</div>
    </div>
  </div>

  <!-- === PAYOUTS SECTION (UNDER TABLE) === -->
  <div class="payouts-section">
    <div class="payout-title">💰 WINNING PAYOUTS (for selected number)</div>
    <div class="payout-container" id="payoutContainer">
      <div class="empty-payout">✨ Click any number on the table to see all winning bets & odds</div>
    </div>
  </div>
</div>

<script>
  // ---------- AMERICAN ROULETTE DATA ----------
  const redNumbersSet = new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);
  const blackNumbersSet = new Set([2,4,6,8,10,11,13,15,17,20,22,24,26,28,29,31,33,35]);

  function getColor(num) {
    if (num === 0 || num === '00') return 'green';
    const n = Number(num);
    if (redNumbersSet.has(n)) return 'red';
    if (blackNumbersSet.has(n)) return 'black';
    return 'green';
  }

  function getColumn(num) {
    if (num === 0 || num === '00') return null;
    const n = Number(num);
    if (n % 3 === 1) return 1;
    if (n % 3 === 2) return 2;
    return 3;
  }

  function getDozen(num) {
    if (num === 0 || num === '00') return null;
    const n = Number(num);
    if (n >= 1 && n <= 12) return 1;
    if (n >= 13 && n <= 24) return 2;
    if (n >= 25 && n <= 36) return 3;
    return null;
  }

  function getParity(num) {
    if (num === 0 || num === '00') return null;
    const n = Number(num);
    return n % 2 === 0 ? 'even' : 'odd';
  }

  function getHalf(num) {
    if (num === 0 || num === '00') return null;
    const n = Number(num);
    return n <= 18 ? 'low' : 'high';
  }

  // DOM references for history rows
  const row1El = document.getElementById('row1');
  const row2El = document.getElementById('row2');
  const row3El = document.getElementById('row3');
  const numbersGridLand = document.getElementById('numbersGridLand');
  const payoutContainer = document.getElementById('payoutContainer');
  const clearAllBtn = document.getElementById('clearAllBtn');

  // Betting elements (landscape version)
  const col1Bet = document.getElementById('col1BetLand');
  const col2Bet = document.getElementById('col2BetLand');
  const col3Bet = document.getElementById('col3BetLand');
  const dozen1Bet = document.getElementById('dozen1Land');
  const dozen2Bet = document.getElementById('dozen2Land');
  const dozen3Bet = document.getElementById('dozen3Land');
  const lowBet = document.getElementById('lowBetLand');
  const highBet = document.getElementById('highBetLand');
  const evenBet = document.getElementById('evenBetLand');
  const oddBet = document.getElementById('oddBetLand');
  const redBet = document.getElementById('redBetLand');
  const blackBet = document.getElementById('blackBetLand');

  // Data stores
  let allSpins = [];          // array of strings: "0", "00", "1"... "36"
  let currentSelected = null;
  const numberElementMap = new Map();   // key: string number -> DOM element

  // ========== 3-ROW HISTORY RENDERING ==========
  function renderThreeRowHistory() {
    row1El.innerHTML = '';
    row2El.innerHTML = '';
    row3El.innerHTML = '';

    if (allSpins.length === 0) {
      row1El.innerHTML = '<div class="empty-row-msg">🎯 No spins yet — click any number</div>';
      row2El.innerHTML = '';
      row3El.innerHTML = '';
      return;
    }

    // Show newest first (latest spins at beginning of row1)
    const reversedSpins = [...allSpins].reverse();
    const itemsPerRow = Math.ceil(reversedSpins.length / 3);
    const rowsData = [[], [], []];
    for (let i = 0; i < reversedSpins.length; i++) {
      const rowIndex = Math.floor(i / itemsPerRow);
      if (rowIndex < 3) rowsData[rowIndex].push(reversedSpins[i]);
    }

    for (let r = 0; r < 3; r++) {
      const targetRow = r === 0 ? row1El : (r === 1 ? row2El : row3El);
      if (rowsData[r].length === 0) {
        targetRow.innerHTML = '<div class="empty-row-msg">——</div>';
        continue;
      }
      rowsData[r].forEach(num => {
        const bgColor = (() => {
          const col = getColor(num);
          if (col === 'red') return '#c83a3a';
          if (col === 'black') return '#2a2a2a';
          return '#2f7852';
        })();
        const chip = document.createElement('div');
        chip.className = 'history-chip';
        chip.style.background = `radial-gradient(circle at 30% 35%, ${bgColor}, ${bgColor}dd)`;
        chip.innerText = num;
        targetRow.appendChild(chip);
      });
    }
  }

  function addSpinToHistory(number) {
    allSpins.push(String(number));
    renderThreeRowHistory();
  }

  // ========== HIGHLIGHT MANAGEMENT ==========
  function removeAllHighlights() {
    document.querySelectorAll('.number-cell-land, .zero-item, .doublezero-item').forEach(el => {
      el.classList.remove('highlight-number-active');
    });
    const allBetZones = [col1Bet, col2Bet, col3Bet, dozen1Bet, dozen2Bet, dozen3Bet,
                         lowBet, highBet, evenBet, oddBet, redBet, blackBet];
    allBetZones.forEach(zone => {
      if (zone) zone.classList.remove('highlight-bet-active');
    });
  }

  function highlightWinningBets(number) {
    if (number === null) return;
    const numValue = (number === '00') ? '00' : Number(number);
    const color = getColor(numValue);
    if (color === 'red') redBet.classList.add('highlight-bet-active');
    if (color === 'black') blackBet.classList.add('highlight-bet-active');
    
    const parity = getParity(numValue);
    if (parity === 'even') evenBet.classList.add('highlight-bet-active');
    if (parity === 'odd') oddBet.classList.add('highlight-bet-active');
    
    const half = getHalf(numValue);
    if (half === 'low') lowBet.classList.add('highlight-bet-active');
    if (half === 'high') highBet.classList.add('highlight-bet-active');
    
    const dozenIdx = getDozen(numValue);
    if (dozenIdx === 1) dozen1Bet.classList.add('highlight-bet-active');
    if (dozenIdx === 2) dozen2Bet.classList.add('highlight-bet-active');
    if (dozenIdx === 3) dozen3Bet.classList.add('highlight-bet-active');
    
    const colIdx = getColumn(numValue);
    if (colIdx === 1) col1Bet.classList.add('highlight-bet-active');
    if (colIdx === 2) col2Bet.classList.add('highlight-bet-active');
    if (colIdx === 3) col3Bet.classList.add('highlight-bet-active');
  }

  // ========== PAYOUT GENERATION ==========
  function getPayoutDescriptions(number) {
    if (number === null) return [];
    const numVal = (number === '00') ? '00' : Number(number);
    const payouts = [];
    payouts.push(`🎯 STRAIGHT UP ${number} — 35:1`);
    
    if (numVal !== 0 && numVal !== '00') {
      const color = getColor(numVal);
      if (color === 'red') payouts.push(`🔴 RED — 1:1`);
      if (color === 'black') payouts.push(`⚫ BLACK — 1:1`);
      
      const parity = getParity(numVal);
      if (parity === 'even') payouts.push(`🟢 EVEN — 1:1`);
      if (parity === 'odd') payouts.push(`🔵 ODD — 1:1`);
      
      const half = getHalf(numVal);
      if (half === 'low') payouts.push(`⬇️ 1 to 18 — 1:1`);
      if (half === 'high') payouts.push(`⬆️ 19 to 36 — 1:1`);
      
      const dozenIdx = getDozen(numVal);
      if (dozenIdx === 1) payouts.push(`📦 1st DOZEN (1-12) — 2:1`);
      if (dozenIdx === 2) payouts.push(`📦 2nd DOZEN (13-24) — 2:1`);
      if (dozenIdx === 3) payouts.push(`📦 3rd DOZEN (25-36) — 2:1`);
      
      const colIdx = getColumn(numVal);
      if (colIdx === 1) payouts.push(`📌 COLUMN 1 (2:1) — 2:1`);
      if (colIdx === 2) payouts.push(`📌 COLUMN 2 (2:1) — 2:1`);
      if (colIdx === 3) payouts.push(`📌 COLUMN 3 (2:1) — 2:1`);
    } else {
      payouts.push(`🟢 ${number} (Green Zero) — Only Straight Up 35:1`);
    }
    return payouts;
  }

  function updatePayoutsPanel(number) {
    const list = getPayoutDescriptions(number);
    if (!list.length) {
      payoutContainer.innerHTML = '<div class="empty-payout">⚡ Click any number to see payouts</div>';
      return;
    }
    payoutContainer.innerHTML = list.map(text => `<div class="payout-item">💰 ${text}</div>`).join('');
  }

  // ========== CORE: NUMBER CLICK ==========
  function onNumberClick(number) {
    addSpinToHistory(number);
    currentSelected = number;
    removeAllHighlights();
    const clickedElem = numberElementMap.get(String(number));
    if (clickedElem) clickedElem.classList.add('highlight-number-active');
    highlightWinningBets(number);
    updatePayoutsPanel(number);
  }

  function clearAllData() {
    allSpins = [];
    currentSelected = null;
    renderThreeRowHistory();
    removeAllHighlights();
    updatePayoutsPanel(null);
    payoutContainer.innerHTML = '<div class="empty-payout">✨ Cleared — pick a number to see payouts</div>';
  }

  // ========== BUILD NUMBER GRID (LANDSCAPE 3 COLUMNS) ==========
  function buildNumberGrid() {
    const col1Numbers = [1,4,7,10,13,16,19,22,25,28,31,34];
    const col2Numbers = [2,5,8,11,14,17,20,23,26,29,32,35];
    const col3Numbers = [3,6,9,12,15,18,21,24,27,30,33,36];
    
    const col1Div = document.createElement('div'); col1Div.className = 'num-col-land';
    const col2Div = document.createElement('div'); col2Div.className = 'num-col-land';
    const col3Div = document.createElement('div'); col3Div.className = 'num-col-land';
    
    function createNumberCell(num) {
      const div = document.createElement('div');
      div.className = 'number-cell-land';
      const colorType = getColor(num);
      if (colorType === 'red') div.classList.add('red-num');
      else if (colorType === 'black') div.classList.add('black-num');
      else div.classList.add('green-num');
      div.innerText = num;
      div.addEventListener('click', (e) => {
        e.stopPropagation();
        onNumberClick(num);
      });
      return div;
    }
    
    col1Numbers.forEach(n => {
      const el = createNumberCell(n);
      col1Div.appendChild(el);
      numberElementMap.set(String(n), el);
    });
    col2Numbers.forEach(n => {
      const el = createNumberCell(n);
      col2Div.appendChild(el);
      numberElementMap.set(String(n), el);
    });
    col3Numbers.forEach(n => {
      const el = createNumberCell(n);
      col3Div.appendChild(el);
      numberElementMap.set(String(n), el);
    });
    
    numbersGridLand.appendChild(col1Div);
    numbersGridLand.appendChild(col2Div);
    numbersGridLand.appendChild(col3Div);
  }
  
  function attachZeroEvents() {
    const zeroElem = document.querySelector('.zero-item');
    const doubleZeroElem = document.querySelector('.doublezero-item');
    if (zeroElem) {
      zeroElem.addEventListener('click', () => onNumberClick('0'));
      numberElementMap.set('0', zeroElem);
    }
    if (doubleZeroElem) {
      doubleZeroElem.addEventListener('click', () => onNumberClick('00'));
      numberElementMap.set('00', doubleZeroElem);
    }
  }
  
  function setBetZonesCursor() {
    const allBets = [col1Bet, col2Bet, col3Bet, dozen1Bet, dozen2Bet, dozen3Bet,
                     lowBet, highBet, evenBet, oddBet, redBet, blackBet];
    allBets.forEach(b => { if (b) b.style.cursor = 'default'; });
  }
  
  // INITIALIZE
  function init() {
    buildNumberGrid();
    attachZeroEvents();
    setBetZonesCursor();
    clearAllBtn.addEventListener('click', clearAllData);
    renderThreeRowHistory();
    updatePayoutsPanel(null);
  }
  
  init();
</script>
</body>
</html>
