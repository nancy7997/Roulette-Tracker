<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive American Roulette Tracker</title>
    <style>
        :root {
            --green-felt: #2b7a4b;
            --board-green: #0b592b;
            --red-num: #d92525;
            --black-num: #111111;
            --border-color: #ffffff;
            --highlight: #ffd700;
        }

        body {
            background-color: var(--green-felt);
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* History Tracker Section */
        #history-container {
            width: 100%;
            max-width: 900px;
            height: 180px; /* Increased space to fit ~3 rows of larger balls */
            background-color: rgba(0, 0, 0, 0.2);
            border: 2px solid var(--border-color);
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 8px;
            overflow: hidden;
            box-sizing: border-box;
        }

        .history-ball {
            width: 45px; /* Increased Ball Size */
            height: 45px; /* Increased Ball Size */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 20px; /* Increased Font Size */
            border: 2px solid white;
            box-shadow: 1px 1px 4px rgba(0,0,0,0.6);
        }

        .controls {
            margin-bottom: 20px;
        }

        button {
            background-color: #333;
            color: white;
            border: 2px solid white;
            padding: 8px 16px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }

        button:hover {
            background-color: #555;
            border-color: var(--highlight);
            color: var(--highlight);
        }

        /* Roulette Board Layout */
        .board-container {
            display: grid;
            grid-template-columns: 60px repeat(12, 60px) 60px;
            grid-template-rows: repeat(5, 60px);
            background-color: var(--board-green);
            border: 2px solid var(--border-color);
            box-sizing: border-box;
            gap: 1px;
            background-color: var(--border-color); /* Acts as borders via gap */
            margin-bottom: 20px;
        }

        .cell {
            background-color: var(--board-green);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            user-select: none;
            transition: all 0.1s;
        }
        
        /* Outside Bets match the felt background instead of the board green */
        .cell.outside {
            background-color: var(--green-felt);
        }
        
        /* Retain colors for the specific Red/Black outside bets */
        .cell.outside.bg-red {
            background-color: var(--red-num);
        }
        .cell.outside.bg-black {
            background-color: var(--black-num);
        }

        .cell:hover {
            opacity: 0.8;
        }

        /* Default rotation for numbers and 2 to 1 columns */
        .cell span {
            transform: rotate(-90deg);
            font-size: 20px;
            font-weight: bold;
            white-space: nowrap;
        }

        /* Horizontal rotation specifically for dozens and bottom row bets */
        .dozen span, .half span, .parity span, .color-bet span {
            transform: rotate(0deg);
        }

        /* Colors */
        .bg-red { background-color: var(--red-num); }
        .bg-black { background-color: var(--black-num); }
        .bg-green { background-color: var(--board-green); }

        /* Highlight classes */
        .highlight {
            box-shadow: inset 0 0 0 4px var(--highlight);
            z-index: 10;
        }
        .highlight span {
            color: var(--highlight);
        }

        /* Specific Cell Placements */
        #zero-double { grid-column: 1; grid-row: 1 / 3; }
        #zero-single { grid-column: 1; grid-row: 3 / 4; height: 120px;}

        /* Adjust 00 and 0 styling to match image split */
        .zero-wrapper {
            grid-column: 1;
            grid-row: 1 / 4;
            display: flex;
            flex-direction: column;
            gap: 1px;
            background-color: var(--border-color);
        }
        .zero-cell {
            flex: 1;
            background-color: var(--board-green);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.1s;
        }
        .zero-cell span {
            transform: rotate(-90deg);
            font-size: 22px;
            font-weight: bold;
        }
        .zero-cell:hover { opacity: 0.8; }
        .zero-cell.highlight {
            box-shadow: inset 0 0 0 4px var(--highlight);
            color: var(--highlight);
        }

        /* Bottom outside bets */
        .dozen { grid-column: auto / span 4; grid-row: 4; }
        .half, .parity, .color-bet { grid-column: auto / span 2; grid-row: 5; }

        /* Payouts Section */
        #payouts-container {
            width: 100%;
            max-width: 900px;
            background-color: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 5px;
            border: 1px solid var(--border-color);
            box-sizing: border-box;
            min-height: 150px;
        }

        #payouts-container h2 {
            margin-top: 0;
            color: var(--highlight);
            border-bottom: 1px solid #666;
            padding-bottom: 10px;
            font-size: 26px;
        }

        #payouts-list {
            list-style-type: none;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        #payouts-list li {
            font-size: 20px;
            padding: 5px 0;
        }
        
        #payouts-list li strong {
            color: #fff;
        }
    </style>
</head>
<body>

    <h1>Roulette Tracker</h1>

    <div id="history-container">
        </div>

    <div class="controls">
        <button id="clear-btn">Clear History</button>
    </div>

    <div class="board-container" id="board">
        <div class="zero-wrapper">
            <div class="zero-cell num-click" data-num="00" data-type="zero" id="cell-00"><span>00</span></div>
            <div class="zero-cell num-click" data-num="0" data-type="zero" id="cell-0"><span>0</span></div>
        </div>

        </div>

    <div id="payouts-container">
        <h2 id="payout-title">Select a number to view payouts</h2>
        <ul id="payouts-list">
            </ul>
    </div>

    <script>
        // Board Configuration
        const boardEl = document.getElementById('board');
        const historyContainer = document.getElementById('history-container');
        const payoutsList = document.getElementById('payouts-list');
        const payoutTitle = document.getElementById('payout-title');
        
        const redNumbers = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
        const blackNumbers = [2,4,6,8,10,11,13,15,17,20,22,24,26,28,29,31,33,35];

        let history = [];

        // Build the Numbers Grid
        const buildBoard = () => {
            // Row 1 (Top): 3, 6, 9...
            for(let i = 3; i <= 36; i += 3) createNumberCell(i, 1, (i/3) + 1);
            // Row 2 (Middle): 2, 5, 8...
            for(let i = 2; i <= 35; i += 3) createNumberCell(i, 2, Math.ceil(i/3) + 1);
            // Row 3 (Bottom): 1, 4, 7...
            for(let i = 1; i <= 34; i += 3) createNumberCell(i, 3, Math.ceil(i/3) + 1);

            // Column Bets (2 to 1)
            createOutsideCell('2 to 1', 'col-3', 1, 14);
            createOutsideCell('2 to 1', 'col-2', 2, 14);
            createOutsideCell('2 to 1', 'col-1', 3, 14);

            // Dozens
            createOutsideCell('1st 12', 'doz-1', 4, 2, 4, 'dozen');
            createOutsideCell('2nd 12', 'doz-2', 4, 6, 4, 'dozen');
            createOutsideCell('3rd 12', 'doz-3', 4, 10, 4, 'dozen');

            // Bottom Row Bets
            createOutsideCell('1 to 18', 'low', 5, 2, 2, 'half');
            createOutsideCell('Even', 'even', 5, 4, 2, 'parity');
            createOutsideCell('Red', 'red', 5, 6, 2, 'color-bet bg-red');
            createOutsideCell('Black', 'black', 5, 8, 2, 'color-bet bg-black');
            createOutsideCell('Odd', 'odd', 5, 10, 2, 'parity');
            createOutsideCell('19 to 36', 'high', 5, 12, 2, 'half');
        };

        const getColorClass = (num) => {
            if (redNumbers.includes(num)) return 'bg-red';
            if (blackNumbers.includes(num)) return 'bg-black';
            return 'bg-green';
        };

        const createNumberCell = (num, row, col) => {
            const div = document.createElement('div');
            div.className = `cell num-click ${getColorClass(num)}`;
            div.style.gridRow = row;
            div.style.gridColumn = col;
            div.dataset.num = num;
            div.id = `cell-${num}`;
            div.innerHTML = `<span>${num}</span>`;
            boardEl.appendChild(div);
        };

        const createOutsideCell = (text, id, row, col, span = 1, extraClass = '') => {
            const div = document.createElement('div');
            div.className = `cell outside ${extraClass}`;
            div.style.gridRow = row;
            div.style.gridColumn = `${col} / span ${span}`;
            div.id = `bet-${id}`;
            div.innerHTML = `<span>${text}</span>`;
            boardEl.appendChild(div);
        };

        // Interaction Logic
        boardEl.addEventListener('click', (e) => {
            const cell = e.target.closest('.num-click');
            if (!cell) return;

            const numStr = cell.dataset.num;
            processSpin(numStr);
        });

        const processSpin = (numStr) => {
            clearHighlights();

            let numObj = { val: numStr, color: 'green' };
            let isZero = (numStr === '0' || numStr === '00');
            let numInt = parseInt(numStr);

            let winningBets = [{ name: `Straight Up (${numStr})`, payout: '35 to 1' }];

            if (!isZero) {
                // Determine color
                if (redNumbers.includes(numInt)) {
                    numObj.color = 'red';
                    document.getElementById('bet-red').classList.add('highlight');
                    winningBets.push({ name: 'Red', payout: '1 to 1' });
                } else {
                    numObj.color = 'black';
                    document.getElementById('bet-black').classList.add('highlight');
                    winningBets.push({ name: 'Black', payout: '1 to 1' });
                }

                // Determine Parity
                if (numInt % 2 === 0) {
                    document.getElementById('bet-even').classList.add('highlight');
                    winningBets.push({ name: 'Even', payout: '1 to 1' });
                } else {
                    document.getElementById('bet-odd').classList.add('highlight');
                    winningBets.push({ name: 'Odd', payout: '1 to 1' });
                }

                // Determine High/Low
                if (numInt <= 18) {
                    document.getElementById('bet-low').classList.add('highlight');
                    winningBets.push({ name: '1 to 18', payout: '1 to 1' });
                } else {
                    document.getElementById('bet-high').classList.add('highlight');
                    winningBets.push({ name: '19 to 36', payout: '1 to 1' });
                }

                // Determine Dozen
                if (numInt <= 12) {
                    document.getElementById('bet-doz-1').classList.add('highlight');
                    winningBets.push({ name: '1st 12', payout: '2 to 1' });
                } else if (numInt <= 24) {
                    document.getElementById('bet-doz-2').classList.add('highlight');
                    winningBets.push({ name: '2nd 12', payout: '2 to 1' });
                } else {
                    document.getElementById('bet-doz-3').classList.add('highlight');
                    winningBets.push({ name: '3rd 12', payout: '2 to 1' });
                }

                // Determine Column
                if (numInt % 3 === 0) {
                    document.getElementById('bet-col-3').classList.add('highlight');
                    winningBets.push({ name: '3rd Column', payout: '2 to 1' });
                } else if (numInt % 3 === 2) {
                    document.getElementById('bet-col-2').classList.add('highlight');
                    winningBets.push({ name: '2nd Column', payout: '2 to 1' });
                } else {
                    document.getElementById('bet-col-1').classList.add('highlight');
                    winningBets.push({ name: '1st Column', payout: '2 to 1' });
                }
            }

            // Highlight the specific number
            document.getElementById(`cell-${numStr}`).classList.add('highlight');

            // Update UI
            updateHistory(numObj);
            updatePayouts(numStr, winningBets);
        };

        const clearHighlights = () => {
            document.querySelectorAll('.highlight').forEach(el => el.classList.remove('highlight'));
        };

        const updateHistory = (numObj) => {
            history.unshift(numObj);
            
            // Limit history to keep layout clean (approx 50 elements)
            if (history.length > 50) history.pop();

            renderHistory();
        };

        const renderHistory = () => {
            historyContainer.innerHTML = '';
            history.forEach(item => {
                const ball = document.createElement('div');
                ball.className = 'history-ball';
                
                if (item.color === 'red') ball.style.backgroundColor = 'var(--red-num)';
                else if (item.color === 'black') ball.style.backgroundColor = 'var(--black-num)';
                else ball.style.backgroundColor = 'var(--board-green)';
                
                ball.textContent = item.val;
                historyContainer.appendChild(ball);
            });
        };

        const updatePayouts = (numStr, winningBets) => {
            payoutTitle.textContent = `Winning Payouts for: ${numStr}`;
            payoutsList.innerHTML = '';
            
            winningBets.forEach(bet => {
                const li = document.createElement('li');
                li.innerHTML = `<strong>${bet.name}:</strong> <span style="color:var(--highlight)">${bet.payout}</span>`;
                payoutsList.appendChild(li);
            });
        };

        document.getElementById('clear-btn').addEventListener('click', () => {
            history = [];
            renderHistory();
            clearHighlights();
            payoutTitle.textContent = 'Select a number to view payouts';
            payoutsList.innerHTML = '';
        });

        // Initialize Board
        buildBoard();

    </script>
</body>
</html>
